# Minimal truthful proving-fixture template.
#
# This first fixture-system slice is intentionally small:
# - the fixture owns the video path
# - expected gestures are authored as direct time windows
# - forbidden gestures are optional clip-wide bans
# - the proving harness records a structured event timeline + state snapshots
#
# Time windows are human-authored, near-second truth. Prefer honest
# approximate windows over fake millisecond precision.

schema_version: 1
fixture_id: boxing__punch_left__positive__guard_start_end__take_01
family: boxing

video:
  # Relative to this YAML file unless absolute.
  path: ./boxing__punch_left__positive__guard_start_end__take_01.mp4

# Optional human notes for authoring/audit context.
notes:
  - candidate Boxing clip with repeated left punches
  - windows below are approximate human-authored timing, not frame-exact labels

expected_gestures:
  - name: punch_left
    windows:
      - start_ms: 900
        end_ms: 1300
      - start_ms: 1900
        end_ms: 2300
      - start_ms: 2900
        end_ms: 3300
      - start_ms: 3900
        end_ms: 4300

# Optional. Omit entirely when false-positive bans are not important for the clip.
forbidden_gestures:
  - name: punch_right
  - name: uppercut_right
