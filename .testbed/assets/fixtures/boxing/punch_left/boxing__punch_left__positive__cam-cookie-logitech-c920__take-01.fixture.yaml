# Concrete example fixture for a human-reviewed Boxing one-shot candidate.
# This example is intentionally YAML-first so authors can annotate why the clip
# is trustworthy, what it proves, and what it does not prove.
#
# The comments below explain both the field purpose and how to think about it
# when authoring a real Boxing fixture.

# Required: schema version for the fixture metadata format.
schema_version: 1
# Required: unique id for this fixture; usually the same as the shared file basename.
fixture_id: boxing__punch_left__positive__cam-cookie-logitech-c920__take-01
# Required: current review maturity. This stays candidate until a human approves it as canonical.
approval_level: candidate
# Required: top-level detector family.
family: boxing
# Required: specific Boxing feature expected from this take.
feature: punch_left
# Required: clip intent. Here positive means the target event should happen.
intent: positive
# Required: motion pattern category. A single punch is a oneshot event.
motion_shape: oneshot
# Required: sibling source video filename stored next to this sidecar.
video_file: boxing__punch_left__positive__cam-cookie-logitech-c920__take-01.mp4
# Required: when the take was captured, in ISO-8601 form.
captured_at: 2026-05-05T00:00:00-04:00
# Required: who recorded/performed this take.
captured_by: Derrick Barra
# Required: host/rig name used during capture.
capture_host: cookie

# Required: camera provenance for later review and regression debugging.
camera:
  # Required: human-readable camera/model label.
  label: logitech-c920
  # Required: camera setup/orientation note.
  mode: front-facing
  # Required: whether the detector input was mirrored. This matters for left/right interpretation.
  mirrored_input: true
  # Required: source frame rate.
  frame_rate: 30
  # Required: source resolution in pixels.
  resolution:
    # Required: video width.
    width: 1920
    # Required: video height.
    height: 1080

# Required section: practical capture conditions that help explain detector behavior.
environment:
  # Optional: quick room/framing context for the take.
  room_notes: even front lighting, neutral background, full upper body visible
  # Optional: lighting-specific caveats or strengths.
  lighting_notes: no major backlight; punch arm remains readable through extension
  # Optional: clothing/visibility note relevant to body-part tracking.
  wardrobe_notes: arms/hands clearly visible

# Required: timing anchors for the clip so humans and automation look at the same moments.
clip_timing:
  # Required: full clip duration.
  duration_ms: 2200
  # Required: neutral lead-in before the punch.
  lead_in_ms: 650
  # Required: approximate moment the punch starts.
  action_start_ms: 760
  # Required: approximate moment the punch action ends.
  action_end_ms: 1120
  # Required: by this time the motion should have settled and the detector should be able to re-arm.
  settle_end_ms: 2050

# Required: bounded statements about what this clip is allowed to prove.
claims:
  - regression check for one emitted punch_left event in the expected window
  - regression check for punch ready/reset observability on the Boxing proving scene
  - regression check that sibling one-shot Boxing events stay suppressed for this take

# Required: explicit honesty about what this clip does not prove.
non_claims:
  - does not prove live workout ergonomics or fatigue behavior
  - does not prove universal threshold correctness across rooms/cameras/body types
  - does not replace live human verification on Cookie

# Required section: review state for promotion from candidate to canonical.
review:
  # Required: current review status.
  status: pending
  # Optional until someone reviews the take.
  reviewed_by: ''
  # Optional until reviewed.
  reviewed_at: ''
  # Optional but useful: why the clip is still pending or what the reviewer should look for.
  notes: Keep as candidate until a human reviewer agrees the left-straight read is clearly canonical.

# Required section: expected detector outcomes for this punch clip.
expected_detector_behavior:
  # Required here: this fixture expects one emitted Boxing event.
  expected_events:
    - # Required per entry: event name expected from the detector.
      name: punch_left
      # Required per entry: how many times that event should occur.
      count: 1
      # Recommended: acceptable event timing window in milliseconds.
      window_ms:
        # Required when window_ms is used: earliest allowed punch emission.
        start: 780
        # Required when window_ms is used: latest allowed punch emission.
        end: 1180
      # Conditionally optional: payload expectations for this event. Empty is fine because punch_left has no asserted payload fields here.
      payload: {}

  # Optional but strongly recommended: events that must not appear during this take.
  forbidden_events:
    - punch_right
    - hook_left
    - hook_right
    - uppercut_left
    - uppercut_right
    - knee_left
    - knee_right

  # Conditionally optional: state windows matter for held states like guard/squat, but not for a one-shot punch.
  expected_state_windows: []

  # Recommended: ready/reset/re-arm behavior for the signal being exercised.
  expected_ready_transitions:
    - # Required when used: the specific signal whose readiness lifecycle is under test.
      signal: punch_left
      # Required: punch_left should already be armed before the action begins.
      must_be_ready_before_ms: 760
      # Conditionally optional: period where reset/not-ready is acceptable after firing.
      may_be_reset_during_ms:
        # Required when reset window is present: start of allowed reset period.
        start: 780
        # Required when reset window is present: end of allowed reset period.
        end: 1500
      # Required: punch_left should be ready again by the end of settle.
      must_be_ready_again_by_ms: 2050

# Required section: proving-scene/debug fields that should stay available for this clip.
expected_observability:
  # Required: proving scene used to inspect Boxing truth surfaces.
  scene: boxing_proving.tscn
  # Required: visible proving-scene fields that should exist for this feature.
  required_scene_surfaces:
    - signal_board.punch_left.status
    - signal_board.punch_left.count
    - signal_board.punch_left.last
    - signal_board.punch_left.last_power
  # Required: lower-level debug fields used to explain why the detector fired or did not fire.
  required_debug_fields:
    - gesture_debug.ready.punch_left
    - gesture_debug.boxing.left.punch_distance
    - gesture_debug.boxing.left.punch_velocity
    - gesture_debug.boxing.left.punch_extension

# Required section: supporting evidence files that live beside this fixture.
artifacts:
  # Conditionally optional: notes file for human context, review notes, or capture quirks.
  notes_file: boxing__punch_left__positive__cam-cookie-logitech-c920__take-01.notes.md
  # Optional: reference to the broader live testing session this take came from.
  source_session_ref: human-verification-session-2026-05-05-cookie
  # Optional: screenshots or stills worth preserving with the fixture.
  screenshots: []
